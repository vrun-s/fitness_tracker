name: Log entry

on:
  issues:
    types: [opened]

jobs:
  log:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Debug issue (temporary)
        run: |
          echo "LABELS:"
          echo '${{ toJson(github.event.issue.labels) }}'
          echo "BODY:"
          echo '${{ github.event.issue.body }}'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Parse issue and update log
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: node scripts/parseIssue.js   # ✅ fixed typo

      - name: Update README
        run: node scripts/generateReadme.js

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/log.json README.md
          git diff --staged --quiet || git commit -m "log: new workout entry"
          git push

      - name: Close Issue
        run: gh issue close ${{ github.event.issue.number }} --comment "Logged Successfully"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}